name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS (arm64 + x64) ─────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps & PyInstaller
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend binary (arm64)
        run: cd backend && python -m PyInstaller backend.spec -y

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Build frontend + Electron
        run: npm run build && npm run build:electron

      - name: Strip xattrs (prevents codesign resource-fork error)
        run: xattr -cr backend/dist/api_server || true

      - name: Package macOS DMG (arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps & PyInstaller
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend binary
        run: cd backend && python -m PyInstaller backend.spec -y

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Build frontend + Electron
        run: npm run build && npm run build:electron

      - name: Package Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfuse2 fuse libgtk-3-dev libnotify-dev libnss3-dev libxss1 libxtst6 xauth xvfb python3-dev gcc g++ make

      - name: Install Python deps & PyInstaller
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend binary
        run: cd backend && python -m PyInstaller backend.spec -y

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Build frontend + Electron
        run: npm run build && npm run build:electron

      - name: Package Linux AppImage
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  # ── GitHub Release ───────────────────────────────────────────────────────────
  publish:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CreatorOS ${{ github.ref_name }}
          body: |
            ## CreatorOS ${{ github.ref_name }}

            ### Download

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS Apple Silicon | `*-arm64.dmg` | M1/M2/M3/M4 Mac |
            | Windows | `*.exe` | Windows 10/11 x64 |
            | Linux | `*.AppImage` | Any Linux x64 |

            ### First launch
            1. Open the app
            2. Go to **Settings** and paste your API keys:
               - [NVIDIA NIM API key](https://build.nvidia.com) — free tier available
               - [Tavily Search API key](https://app.tavily.com) — free tier available
            3. All AI features unlock instantly, no restart needed.

            > **macOS:** If blocked, right-click the app → Open → Open anyway.
            > **Linux:** `chmod +x CreatorOS-*.AppImage` then run it.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
