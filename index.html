<!DOCTYPE html>
<html lang="en" style="position:fixed;inset:0;width:100%;height:100%;overflow:hidden;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CreatorOS</title>
    <style>
      /* Pre-React lock — prevents flash of scrollable content */
      html, body { 
        position: fixed; inset: 0; width: 100%; height: 100%;
        overflow: hidden; margin: 0; padding: 0;
        background: #0D0D0D;
      }
      #root { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
